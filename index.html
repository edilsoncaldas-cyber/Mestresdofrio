<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestres do Frio - Sistema de Pontuação (Cloud)</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ExcelJS para exportar e ler .xlsx com listas suspensas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase Modules (Isolados do Babel para evitar erros de 'require') -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = {
            initializeApp,
            getAuth,
            signInWithCustomToken,
            signInAnonymously,
            onAuthStateChanged,
            getFirestore,
            doc,
            onSnapshot,
            setDoc
        };
        window.dispatchEvent(new Event('firebase-modules-loaded'));
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .bg-refrigeracao { background-color: #0ea5e9; } /* Azul Elgin */
        .bg-climatizacao { background-color: #f97316; } /* Laranja Quente */
        .text-refrigeracao { color: #0ea5e9; }
        .text-climatizacao { color: #f97316; }
        
        /* Oculta scrollbar para o placar de projeção */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Fundo animado para tela de login */
        .login-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- DADOS INICIAIS BASEADOS NO DOC ---
        const PROVAS = [
            { id: 1, nome: "Prova 1: Área de Lazer" },
            { id: 2, nome: "Prova 2: Buffet de Eventos" },
            { id: 3, nome: "Prova 3: Restaurante" },
            { id: 4, nome: "Prova 4: Supermercado" },
            { id: 5, nome: "Prova 5: CPD / Data Center" },
            { id: 6, nome: "Prova 6: Logística Industrial" },
            { id: 7, nome: "Prova 7: Semi-final" },
            { id: 8, nome: "Prova 8: Grande Final" }
        ];

        const CRITERIOS = [
            { id: 'c1', nome: "1. Procedimento técnico correto", max: 20 },
            { id: 'c2', nome: "2. Uso adequado de instrumentos", max: 20 },
            { id: 'c3', nome: "3. Diagnóstico assertivo", max: 20 },
            { id: 'c4', nome: "4. Correção da falha", max: 20 },
            { id: 'c5', nome: "5. Segurança e organização", max: 20 }
        ];

        // SUB-CRITÉRIOS PADRÕES
        const DEFAULT_SUBCRITERIOS = [
            // REFRIGERAÇÃO (R)
            { id: 'r_c1_1', mod: 'R', crit: 'c1', desc: 'Desligou equipamento antes do manuseio', pts: 5 },
            { id: 'r_c1_2', mod: 'R', crit: 'c1', desc: 'Recolheu gás conforme norma', pts: 15 },
            { id: 'r_c2_1', mod: 'R', crit: 'c2', desc: 'Uso correto do multímetro na resistência', pts: 10 },
            { id: 'r_c2_2', mod: 'R', crit: 'c2', desc: 'Conexão do manifold sem vazamentos', pts: 10 },
            { id: 'r_c3_1', mod: 'R', crit: 'c3', desc: 'Identificou resistência queimada rapidamente', pts: 10 },
            { id: 'r_c3_2', mod: 'R', crit: 'c3', desc: 'Diagnóstico elétrico preciso', pts: 10 },
            { id: 'r_c4_1', mod: 'R', crit: 'c4', desc: 'Substituiu peça adequadamente', pts: 10 },
            { id: 'r_c4_2', mod: 'R', crit: 'c4', desc: 'Realizou vácuo e carga de fluido corretos', pts: 10 },
            { id: 'r_c5_1', mod: 'R', crit: 'c5', desc: 'EPIs completos (Luva/Óculos)', pts: 10 },
            { id: 'r_c5_2', mod: 'R', crit: 'c5', desc: 'Deixou ambiente limpo após o serviço', pts: 10 },
            
            // CLIMATIZAÇÃO (C)
            { id: 'c_c1_1', mod: 'C', crit: 'c1', desc: 'Verificação do manual de instalação', pts: 5 },
            { id: 'c_c1_2', mod: 'C', crit: 'c1', desc: 'Adequação da tubulação e Infraestrutura', pts: 15 },
            { id: 'c_c2_1', mod: 'C', crit: 'c2', desc: 'Manuseio de flangeador e cortador', pts: 10 },
            { id: 'c_c2_2', mod: 'C', crit: 'c2', desc: 'Utilização de bomba de vácuo e vacuômetro', pts: 10 },
            { id: 'c_c3_1', mod: 'C', crit: 'c3', desc: 'Identificação de código de erro no display', pts: 10 },
            { id: 'c_c3_2', mod: 'C', crit: 'c3', desc: 'Teste de components elétricos/sensores', pts: 10 },
            { id: 'c_c4_1', mod: 'C', crit: 'c4', desc: 'Correção de vazamentos em flanges', pts: 10 },
            { id: 'c_c4_2', mod: 'C', crit: 'c4', desc: 'Reoperação e estabilização térmica', pts: 10 },
            { id: 'c_c5_1', mod: 'C', crit: 'c5', desc: 'EPIs completos (Luva/Cinto)', pts: 10 },
            { id: 'c_c5_2', mod: 'C', crit: 'c5', desc: 'Organização e segurança com ferramentas', pts: 10 }
        ];

        const PARTICIPANTES_INICIAIS = [
            { id: 'r1', nome: "Participante Ref 1", modalidade: "R" },
            { id: 'r2', nome: "Participante Ref 2", modalidade: "R" },
            { id: 'r3', nome: "Participante Ref 3", modalidade: "R" },
            { id: 'r4', nome: "Participante Ref 4", modalidade: "R" },
            { id: 'r5', nome: "Participante Ref 5", modalidade: "R" },
            { id: 'c1', nome: "Participante Cli 1", modalidade: "C" },
            { id: 'c2', nome: "Participante Cli 2", modalidade: "C" },
            { id: 'c3', nome: "Participante Cli 3", modalidade: "C" },
            { id: 'c4', nome: "Participante Cli 4", modalidade: "C" },
            { id: 'c5', nome: "Participante Cli 5", modalidade: "C" }
        ];

        // USUÁRIOS PADRÃO
        const DEFAULT_USERS = [
            { user: 'admin', email: 'admin@mestresdofrio.com', pass: '123', role: 'admin', modality: 'ALL' },
            { user: 'j1', email: 'jurado1@elgin.com.br', pass: '123', role: 'j1', modality: 'R' },
            { user: 'j2', email: 'jurado2@senai.br', pass: '123', role: 'j2', modality: 'C' },
            { user: 'apresentador', email: 'apresentador@tv.com', pass: '123', role: 'apresentador', modality: 'ALL' }
        ];

        function App() {
            // --- ESTADOS NUVEM & FIREBASE ---
            const [fbReady, setFbReady] = useState(false);
            const [dataLoaded, setDataLoaded] = useState(false);
            const [db, setDb] = useState(null);
            
            // --- ESTADOS DE AUTENTICAÇÃO E PERFIL ---
            const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('mdf_current_user')) || null);
            const [users, setUsers] = useState(DEFAULT_USERS);
            const [authMode, setAuthMode] = useState('login');
            const [authUser, setAuthUser] = useState('');
            const [authEmail, setAuthEmail] = useState('');
            const [authPass, setAuthPass] = useState('');
            const [authRole, setAuthRole] = useState('admin');
            const [authModality, setAuthModality] = useState('R');
            const [authError, setAuthError] = useState('');
            const [authSuccess, setAuthSuccess] = useState('');
            
            const [resetCode, setResetCode] = useState('');
            const [generatedCode, setGeneratedCode] = useState('');
            const [targetUser, setTargetUser] = useState(null);

            // --- ESTADOS DA APLICAÇÃO (Sincronizados na Nuvem ou Local) ---
            const [view, setView] = useState('tablet');
            const [logoUrl, setLogoUrl] = useState(() => localStorage.getItem('mdf_logo') || null);
            
            const [participantes, setParticipantes] = useState(() => {
                const salvos = localStorage.getItem('mdf_participantes');
                return salvos ? JSON.parse(salvos) : PARTICIPANTES_INICIAIS;
            });
            
            const [notas, setNotas] = useState(() => {
                const salvas = localStorage.getItem('mdf_notas');
                return salvas ? JSON.parse(salvas) : [];
            }); 
            
            const [subcriterios, setSubcriterios] = useState(() => {
                const salvos = localStorage.getItem('mdf_subcriterios');
                return salvos ? JSON.parse(salvos) : DEFAULT_SUBCRITERIOS;
            });

            // Referências para arquivos
            const [arquivoExcel, setArquivoExcel] = useState(null);
            const inputExcelRef = useRef(null);
            const inputBackupRef = useRef(null);

            // Estado do Formulário de Lançamento (Tablet)
            const [formMod, setFormMod] = useState('R');
            const [formProva, setFormProva] = useState(1);
            const [formPart, setFormPart] = useState('r1');
            const [formDupla, setFormDupla] = useState('');
            
            const [avalJ1, setAvalJ1] = useState({});
            const [avalJ2, setAvalJ2] = useState({});
            const [notaExtra, setNotaExtra] = useState(0);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'mestres-do-frio-db';

            // --- 1. INICIALIZAÇÃO FIREBASE NUVEM ---
            useEffect(() => {
                const initFirebase = async () => {
                    // Verifica se está rodando no GitHub ou Computador Local
                    if (typeof __firebase_config === 'undefined' || !__firebase_config) {
                        console.warn("Configurações de Nuvem não encontradas. Iniciando em Modo Local (GitHub/Offline).");
                        setDataLoaded(true); // Pula a tela de carregamento na hora
                        return;
                    }

                    if (!window.FB) {
                        await new Promise(resolve => window.addEventListener('firebase-modules-loaded', resolve, { once: true }));
                    }

                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestoreDb = window.FB.getFirestore(app);
                        setDb(firestoreDb);

                        // Auth anônima ou custom token para proteger os dados na nuvem
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await window.FB.signInAnonymously(auth);
                        }

                        window.FB.onAuthStateChanged(auth, (user) => {
                            if(user) setFbReady(true);
                        });
                    } catch (e) {
                        console.error("Erro ao iniciar Cloud Firebase:", e);
                        // Caso falhe por permissões na nuvem, faz fallback para local:
                        setDataLoaded(true);
                    }
                };
                initFirebase();
            }, []);

            // --- 2. SINCRONIZAÇÃO EM TEMPO REAL ---
            useEffect(() => {
                if (!fbReady || !db) return;
                
                const { doc, onSnapshot, setDoc } = window.FB;
                const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_state', 'main');

                const unsubscribe = onSnapshot(stateRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.participantes) setParticipantes(data.participantes);
                        if (data.notas) setNotas(data.notas);
                        if (data.users) setUsers(data.users);
                        if (data.subcriterios) setSubcriterios(data.subcriterios);
                        if (data.logoUrl !== undefined) setLogoUrl(data.logoUrl);
                        setDataLoaded(true);
                    } else {
                        // Documento nuvem não existe, inicializando...
                        setDoc(stateRef, {
                            participantes: PARTICIPANTES_INICIAIS,
                            notas: [],
                            users: DEFAULT_USERS,
                            subcriterios: DEFAULT_SUBCRITERIOS,
                            logoUrl: null
                        }, { merge: true }).then(() => setDataLoaded(true));
                    }
                }, (error) => {
                    console.error("Erro sincronizando dados:", error);
                });

                return () => unsubscribe();
            }, [fbReady, db]);

            // --- RENDERIZAÇÃO DE ÍCONES DO LUCIDE ---
            useEffect(() => {
                if (window.lucide && dataLoaded) {
                    window.lucide.createIcons();
                }
            });

            // Ajusta View Inicial e trava a Modalidade baseada no Perfil
            useEffect(() => {
                if (currentUser && dataLoaded) {
                    if (currentUser.role === 'apresentador') {
                        setView('placar');
                    } else if (currentUser.role === 'j1' || currentUser.role === 'j2') {
                        setView('tablet');
                        if (currentUser.modality && currentUser.modality !== 'ALL') {
                            setFormMod(currentUser.modality);
                        }
                    }
                }
            }, [currentUser, dataLoaded]);

            // Trocar primeiro participante ao trocar modalidade e resetar avaliações
            useEffect(() => {
                const parts = participantes.filter(p => p.modalidade === formMod);
                if(parts.length > 0) {
                    const currentPartBelongs = parts.find(p => p.id === formPart);
                    if (!currentPartBelongs) {
                        setFormPart(parts[0].id);
                    }
                    setFormDupla('');
                    setAvalJ1({});
                    setAvalJ2({});
                }
            }, [formMod, participantes]);

            // Função ajudante para salvar na Nuvem e Local
            const updateCloudState = async (updates) => {
                // Sempre salva no dispositivo como garantia e para o Modo Offline funcionar
                if (updates.participantes) localStorage.setItem('mdf_participantes', JSON.stringify(updates.participantes));
                if (updates.notas) localStorage.setItem('mdf_notas', JSON.stringify(updates.notas));
                if (updates.users) localStorage.setItem('mdf_users', JSON.stringify(updates.users));
                if (updates.subcriterios) localStorage.setItem('mdf_subcriterios', JSON.stringify(updates.subcriterios));
                if (updates.logoUrl !== undefined) localStorage.setItem('mdf_logo', updates.logoUrl);

                // Se não estiver conectado à nuvem, encerra a função aqui
                if (!db || !window.FB) return;
                
                const stateRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'app_state', 'main');
                await window.FB.setDoc(stateRef, updates, { merge: true });
            };

            // --- FUNÇÕES DE AUTENTICAÇÃO ---
            const handleLogin = (e) => {
                e.preventDefault();
                const found = users.find(u => u.user === authUser && u.pass === authPass);
                if(found) {
                    setCurrentUser(found);
                    localStorage.setItem('mdf_current_user', JSON.stringify(found));
                    setAuthError('');
                    setAuthSuccess('');
                } else {
                    setAuthError('Usuário ou senha incorretos.');
                    setAuthSuccess('');
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if(!authUser || !authPass || !authEmail) {
                    setAuthError('Preencha todos os campos obrigatórios.');
                    return;
                }
                if(users.find(u => u.user === authUser)) {
                    setAuthError('Este nome de usuário já existe.');
                    return;
                }
                if(users.find(u => u.email === authEmail)) {
                    setAuthError('Este e-mail já está cadastrado.');
                    return;
                }
                
                const newUser = { 
                    user: authUser,
                    email: authEmail, 
                    pass: authPass, 
                    role: authRole,
                    modality: (authRole === 'j1' || authRole === 'j2') ? authModality : 'ALL' 
                };
                
                const newUsers = [...users, newUser];
                
                // SALVA NA NUVEM / LOCAL
                await updateCloudState({ users: newUsers });
                setUsers(newUsers);
                
                setCurrentUser(newUser);
                localStorage.setItem('mdf_current_user', JSON.stringify(newUser));
                setAuthError('');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('mdf_current_user');
                setAuthUser('');
                setAuthPass('');
                setAuthEmail('');
                setView('tablet');
                setAuthMode('login');
                setAuthSuccess('');
            };

            // --- FUNÇÕES DE RECUPERAÇÃO DE SENHA ---
            const handleForgotPassword = (e) => {
                e.preventDefault();
                if (!authEmail) {
                    setAuthError('Digite o e-mail cadastrado.');
                    return;
                }

                const foundUser = users.find(u => u.email === authEmail);
                if (foundUser) {
                    const code = Math.floor(100000 + Math.random() * 900000).toString();
                    setGeneratedCode(code);
                    setTargetUser(foundUser);
                    setAuthMode('reset');
                    setAuthError('');
                    
                    alert(`=== SIMULAÇÃO DE E-MAIL ===\n\nDestinatário: ${authEmail}\nAssunto: Recuperação de Senha - Mestres do Frio\n\nSeu código de recuperação é: ${code}\n\n===========================`);
                } else {
                    setAuthError('E-mail não encontrado no sistema.');
                    setAuthSuccess('');
                }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                if (resetCode !== generatedCode) {
                    setAuthError('Código de recuperação inválido.');
                    return;
                }
                if (!authPass) {
                    setAuthError('Digite a nova senha.');
                    return;
                }

                const updatedUsers = users.map(u => {
                    if (u.user === targetUser.user) return { ...u, pass: authPass };
                    return u;
                });

                // SALVA NA NUVEM / LOCAL
                await updateCloudState({ users: updatedUsers });
                setUsers(updatedUsers);
                
                setAuthMode('login');
                setAuthPass('');
                setAuthEmail('');
                setResetCode('');
                setTargetUser(null);
                setAuthError('');
                setAuthSuccess('Senha alterada com sucesso! Faça login com a nova senha.');
            };

            const switchAuthMode = (mode) => {
                setAuthMode(mode);
                setAuthError('');
                setAuthSuccess('');
                setAuthPass('');
                setResetCode('');
            };

            // --- FUNÇÕES DE NUVEM E LANÇAMENTO ---
            const handleSalvarNota = async () => {
                const subAtivos = subcriterios.filter(s => s.mod === formMod);
                const totalJ1 = subAtivos.reduce((acc, sub) => acc + (avalJ1[sub.id] === true ? sub.pts : 0), 0);
                const totalJ2 = subAtivos.reduce((acc, sub) => acc + (avalJ2[sub.id] === true ? sub.pts : 0), 0);
                const extraPts = parseInt(notaExtra) || 0;
                const dupla = formDupla || null;

                const idBusca = `${formProva}_${formPart}`;
                const index = notas.findIndex(n => n.id === idBusca);
                let updated = [...notas];
                
                if (index >= 0) {
                    if (currentUser.role === 'j1') {
                        updated[index] = { ...updated[index], totalJ1 };
                    } else if (currentUser.role === 'j2') {
                        updated[index] = { ...updated[index], totalJ2 };
                    } else {
                        updated[index] = { ...updated[index], totalJ1, totalJ2, extra: extraPts, duplaId: dupla };
                    }
                } else {
                    updated.push({
                        id: idBusca,
                        participanteId: formPart,
                        provaId: formProva,
                        totalJ1: currentUser.role === 'j2' ? 0 : totalJ1,
                        totalJ2: currentUser.role === 'j1' ? 0 : totalJ2,
                        extra: currentUser.role === 'admin' ? extraPts : 0,
                        duplaId: currentUser.role === 'admin' ? dupla : null
                    });
                }

                // SALVA DIRETAMENTE NA NUVEM FIREBASE OU LOCAL
                await updateCloudState({ notas: updated });
                setNotas(updated); // Otimista

                alert("Avaliação salva com sucesso!");
                if (currentUser.role === 'j1') setAvalJ1({});
                if (currentUser.role === 'j2') setAvalJ2({});
                if (currentUser.role === 'admin') { setAvalJ1({}); setAvalJ2({}); setNotaExtra(0); setFormDupla(''); }
            };

            const alterarNomeParticipante = async (id, novoNome) => {
                const novos = [...participantes];
                const index = novos.findIndex(x => x.id === id);
                novos[index].nome = novoNome;
                
                // Atualização otimista + nuvem/local
                setParticipantes(novos);
                await updateCloudState({ participantes: novos });
            };

            // --- SISTEMA DE BACKUP DE DADOS (ARQUIVO DE SEGURANÇA EXTRA) ---
            const exportarBackup = () => {
                const dataDeHoje = new Date().toISOString().split('T')[0];
                const backupData = {
                    version: '1.0',
                    data: dataDeHoje,
                    participantes: participantes,
                    notas: notas,
                    users: users,
                    subcriterios: subcriterios
                };

                const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `MestresDoFrio_Backup_${dataDeHoje}.json`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const importarBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        
                        if (importedData.participantes && importedData.notas && importedData.users) {
                            
                            // Envia tudo para a nuvem/local substituindo o estado atual
                            await updateCloudState({
                                participantes: importedData.participantes,
                                notas: importedData.notas,
                                users: importedData.users,
                                subcriterios: importedData.subcriterios || DEFAULT_SUBCRITERIOS
                            });
                            
                            setParticipantes(importedData.participantes);
                            setNotas(importedData.notas);
                            setUsers(importedData.users);
                            if (importedData.subcriterios) setSubcriterios(importedData.subcriterios);

                            alert("Backup restaurado e sincronizado com todos os dispositivos!");
                            if (inputBackupRef.current) inputBackupRef.current.value = "";
                        } else {
                            alert("O arquivo selecionado não parece ser um backup válido do Mestres do Frio.");
                        }
                    } catch (error) {
                        alert("Erro ao ler o arquivo de backup. Verifique se o arquivo não está corrompido.");
                    }
                };
                reader.readAsText(file);
            };

            const handleBaixarModeloExcel = async () => {
                if (!window.ExcelJS) {
                    alert("A biblioteca do Excel ainda está carregando. Tente novamente em instantes.");
                    return;
                }

                const workbook = new window.ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('Subcritérios');

                worksheet.columns = [
                    { header: 'Ar condicionado ou Refrigeração', key: 'mod', width: 35 },
                    { header: 'Prova', key: 'prova', width: 15 },
                    { header: 'Critério', key: 'crit', width: 40 },
                    { header: 'Subcritério', key: 'sub', width: 50 },
                    { header: 'Pontuação por subcritério', key: 'pts', width: 25 }
                ];

                worksheet.getRow(1).font = { bold: true, color: { argb: 'FFFFFFFF' } };
                worksheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F172A' } };

                worksheet.addRow(["Refrigeração", "P1", "1. Procedimento técnico correto", "Desligou equipamento antes do manuseio", 5]);
                worksheet.addRow(["Refrigeração", "P1", "1. Procedimento técnico correto", "Recolheu gás conforme norma", 15]);
                worksheet.addRow(["Ar condicionado", "P1", "1. Procedimento técnico correto", "Verificação do manual de instalação", 10]);
                worksheet.addRow(["Ar condicionado", "P1", "1. Procedimento técnico correto", "Adequação da tubulação", 10]);

                for (let i = 2; i <= 100; i++) {
                    worksheet.getCell(`A${i}`).dataValidation = {
                        type: 'list',
                        allowBlank: true,
                        formulae: ['"Ar condicionado,Refrigeração"']
                    };
                    worksheet.getCell(`B${i}`).dataValidation = {
                        type: 'list',
                        allowBlank: true,
                        formulae: ['"P1,P2,P3,P4,P5,P6,P7,P8"']
                    };
                    worksheet.getCell(`C${i}`).dataValidation = {
                        type: 'list',
                        allowBlank: true,
                        formulae: ['"1. Procedimento técnico correto,2. Uso adequado de instrumentos,3. Diagnóstico assertivo,4. Correção da falha,5. Segurança e organização"']
                    };
                }

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "Modelo_Subcriterios.xlsx";
                link.click();
                window.URL.revokeObjectURL(url);
            };

            const handleSalvarPlanilhaUpload = async () => {
                if (!arquivoExcel) {
                    alert("Por favor, selecione um arquivo primeiro.");
                    return;
                }

                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const arrayBuffer = await arquivoExcel.arrayBuffer();
                    await workbook.xlsx.load(arrayBuffer);
                    const worksheet = workbook.worksheets[0];

                    const novosSubcriterios = [];
                    
                    worksheet.eachRow((row, rowNumber) => {
                        if (rowNumber > 1) {
                            const modRaw = row.getCell(1).text;
                            const critRaw = row.getCell(3).text;
                            const desc = row.getCell(4).text;
                            const pts = parseInt(row.getCell(5).value) || 0;

                            let mod = '';
                            if (modRaw && modRaw.toLowerCase().includes('refrig')) mod = 'R';
                            else if (modRaw && (modRaw.toLowerCase().includes('ar condicionado') || modRaw.toLowerCase().includes('climatiz'))) mod = 'C';

                            let crit = '';
                            if (critRaw && critRaw.startsWith('1')) crit = 'c1';
                            else if (critRaw && critRaw.startsWith('2')) crit = 'c2';
                            else if (critRaw && critRaw.startsWith('3')) crit = 'c3';
                            else if (critRaw && critRaw.startsWith('4')) crit = 'c4';
                            else if (critRaw && critRaw.startsWith('5')) crit = 'c5';

                            if (mod && crit && desc && pts > 0) {
                                novosSubcriterios.push({
                                    id: `${mod.toLowerCase()}_${crit}_${rowNumber}`,
                                    mod,
                                    crit,
                                    desc,
                                    pts
                                });
                            }
                        }
                    });

                    if (novosSubcriterios.length > 0) {
                        // Envia para a nuvem
                        await updateCloudState({ subcriterios: novosSubcriterios });
                        setSubcriterios(novosSubcriterios);
                        
                        alert(`Sucesso! ${novosSubcriterios.length} subcritérios foram carregados e sincronizados com a nuvem/local.`);
                        setArquivoExcel(null);
                        if (inputExcelRef.current) inputExcelRef.current.value = "";
                        setAvalJ1({});
                        setAvalJ2({});
                    } else {
                        alert("Nenhum dado válido encontrado na planilha. Verifique o formato.");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Erro ao ler o arquivo. Certifique-se de que é um formato Excel (.xlsx) válido.");
                }
            };

            const placarCalculado = useMemo(() => {
                let placar = participantes.map(p => ({ ...p, total: 0 }));
                
                notas.forEach(n => {
                    const totalCriterios = n.totalJ1 + n.totalJ2;
                    const pontosExtra = parseInt(n.extra) || 0;

                    const partIndex = placar.findIndex(p => p.id === n.participanteId);
                    if(partIndex > -1) {
                        placar[partIndex].total += totalCriterios + pontosExtra;
                    }

                    if(n.duplaId) {
                        const duplaIndex = placar.findIndex(p => p.id === n.duplaId);
                        if(duplaIndex > -1) {
                            placar[duplaIndex].total += pontosExtra;
                        }
                    }
                });

                return {
                    R: placar.filter(p => p.modalidade === 'R').sort((a,b) => b.total - a.total),
                    C: placar.filter(p => p.modalidade === 'C').sort((a,b) => b.total - a.total)
                };
            }, [participantes, notas]);

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Erro ao tentar tela cheia: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const logoStr = reader.result;
                        setLogoUrl(logoStr);
                        await updateCloudState({ logoUrl: logoStr });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const removerLogo = async () => {
                setLogoUrl(null);
                await updateCloudState({ logoUrl: null });
            };

            // ==========================================
            // RENDER: CARREGANDO DADOS DA NUVEM
            // ==========================================
            if (!dataLoaded) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-sans">
                        <i data-lucide="loader-2" className="w-16 h-16 animate-spin text-cyan-400 mb-6"></i>
                        <h2 className="text-3xl font-black tracking-widest uppercase mb-2">Mestres <span className="text-cyan-400">do Frio</span></h2>
                        <p className="text-slate-400 font-medium tracking-wide">Conectando ao banco de dados...</p>
                    </div>
                );
            }

            // ==========================================
            // RENDER: TELA DE LOGIN / CADASTRO / RECUPERAÇÃO
            // ==========================================
            if (!currentUser) {
                return (
                    <div className="min-h-screen flex text-gray-900 bg-white font-sans">
                        <div className="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-gradient-to-br from-slate-900 via-blue-900 to-cyan-700 justify-center items-center p-12 text-center shadow-2xl z-10">
                            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-white opacity-5 rounded-full blur-3xl pointer-events-none"></div>
                            <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-400 opacity-10 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <div className="relative z-10 flex flex-col items-center">
                                <div className="mb-8 p-6 bg-white/10 backdrop-blur-sm rounded-3xl border border-white/20 shadow-2xl">
                                    <i data-lucide="cloud-lightning" className="w-24 h-24 text-cyan-400 mx-auto mb-4 animate-pulse"></i>
                                    <h2 className="text-4xl font-black text-white uppercase tracking-widest drop-shadow-lg">
                                        Cloud<br/><span className="text-cyan-400">Score</span>
                                    </h2>
                                </div>
                                <p className="text-blue-100 text-xl font-medium max-w-md drop-shadow">
                                    Sistema Oficial de Pontuação Sincronizado em Tempo Real.
                                </p>
                            </div>
                        </div>

                        <div className="w-full lg:w-1/2 flex flex-col justify-center p-8 sm:p-16 xl:p-24 bg-gray-50 relative overflow-y-auto">
                            <div className="text-center mb-10 w-full flex justify-center">
                                {logoUrl ? (
                                    <img src={logoUrl} alt="Mestres do Frio Logo" className="max-h-32 object-contain drop-shadow-md" />
                                ) : (
                                    <h1 className="text-4xl font-black text-slate-900 uppercase tracking-widest mb-2">
                                        Mestres<br/><span className="text-blue-600">do Frio</span>
                                    </h1>
                                )}
                            </div>

                            <div className="max-w-md w-full mx-auto">
                                <div className="mb-8 text-center lg:text-left">
                                    <h2 className="text-3xl font-extrabold text-gray-900 mb-3">
                                        {authMode === 'login' && 'Bem-vindo de volta!'}
                                        {authMode === 'register' && 'Crie sua conta'}
                                        {authMode === 'forgot' && 'Recuperar Senha'}
                                        {authMode === 'reset' && 'Criar Nova Senha'}
                                    </h2>
                                    <p className="text-gray-500 font-medium text-sm">
                                        {authMode === 'login' && 'Insira suas credenciais para acessar o painel na nuvem.'}
                                        {authMode === 'register' && 'Defina seus dados e seu perfil de acesso.'}
                                        {authMode === 'forgot' && 'Insira o e-mail cadastrado para receber o código de recuperação.'}
                                        {authMode === 'reset' && `Insira o código enviado para ${targetUser?.email} e sua nova senha.`}
                                    </p>
                                </div>

                                {authError && (
                                    <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 flex items-center text-red-700 text-sm font-medium rounded-r-md animate-pulse">
                                        <i data-lucide="alert-circle" className="w-5 h-5 mr-3 flex-shrink-0"></i>
                                        {authError}
                                    </div>
                                )}
                                
                                {authSuccess && (
                                    <div className="mb-6 p-4 bg-green-50 border-l-4 border-green-500 flex items-center text-green-700 text-sm font-medium rounded-r-md animate-pulse">
                                        <i data-lucide="check-circle" className="w-5 h-5 mr-3 flex-shrink-0"></i>
                                        {authSuccess}
                                    </div>
                                )}

                                {/* FORMULÁRIO DE LOGIN */}
                                {authMode === 'login' && (
                                    <form onSubmit={handleLogin} className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Nome de Usuário</label>
                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="user" className="w-5 h-5"></i>
                                                </div>
                                                <input type="text" value={authUser} onChange={e => setAuthUser(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                    placeholder="ex: admin" required />
                                            </div>
                                        </div>

                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                                </div>
                                                <input type="password" value={authPass} onChange={e => setAuthPass(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                    placeholder="Digite sua senha" required />
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all transform active:scale-95 flex justify-center items-center text-lg mt-4">
                                            <i data-lucide="log-in" className="w-5 h-5 mr-2"></i> Entrar no Sistema
                                        </button>
                                    </form>
                                )}

                                {/* FORMULÁRIO DE CADASTRO */}
                                {authMode === 'register' && (
                                    <form onSubmit={handleRegister} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Nome de Usuário</label>
                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="user" className="w-5 h-5"></i>
                                                </div>
                                                <input type="text" value={authUser} onChange={e => setAuthUser(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                    placeholder="Escolha um nome de usuário" required />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">E-mail</label>
                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="mail" className="w-5 h-5"></i>
                                                </div>
                                                <input type="email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                    placeholder="Seu e-mail profissional" required />
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Senha</label>
                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                                </div>
                                                <input type="password" value={authPass} onChange={e => setAuthPass(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                    placeholder="Crie uma senha forte" required />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Perfil de Acesso</label>
                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="shield" className="w-5 h-5"></i>
                                                </div>
                                                <select value={authRole} onChange={e => setAuthRole(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium appearance-none cursor-pointer">
                                                    <option value="admin">Administrador (Total)</option>
                                                    <option value="j1">Jurado Elgin (J1)</option>
                                                    <option value="j2">Jurado Técnico SENAI (J2)</option>
                                                    <option value="apresentador">Apresentador (Placar)</option>
                                                </select>
                                            </div>
                                        </div>

                                        {(authRole === 'j1' || authRole === 'j2') && (
                                            <div className="animate-fade-in">
                                                <label className="block text-sm font-bold text-gray-700 mb-2">Especialidade (Modalidade)</label>
                                                <div className="relative group">
                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                        <i data-lucide="wrench" className="w-5 h-5"></i>
                                                    </div>
                                                    <select value={authModality} onChange={e => setAuthModality(e.target.value)} 
                                                        className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium appearance-none cursor-pointer">
                                                        <option value="R">Refrigeração</option>
                                                        <option value="C">Ar Condicionado (Climatização)</option>
                                                    </select>
                                                </div>
                                            </div>
                                        )}

                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all transform active:scale-95 flex justify-center items-center text-lg mt-4">
                                            <i data-lucide="user-plus" className="w-5 h-5 mr-2"></i> Cadastrar Usuário
                                        </button>
                                    </form>
                                )}

                                {/* FORMULÁRIO DE ESQUECI A SENHA */}
                                {authMode === 'forgot' && (
                                    <form onSubmit={handleForgotPassword} className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">E-mail Cadastrado</label>
                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="mail" className="w-5 h-5"></i>
                                                </div>
                                                <input type="email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                    placeholder="ex: admin@mestresdofrio.com" required />
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all transform active:scale-95 flex justify-center items-center text-lg mt-4">
                                            <i data-lucide="send" className="w-5 h-5 mr-2"></i> Enviar Código de Recuperação
                                        </button>
                                    </form>
                                )}

                                {/* FORMULÁRIO DE RESET DE SENHA */}
                                {authMode === 'reset' && (
                                    <form onSubmit={handleResetPassword} className="space-y-5">
                                        <div>

                                            <div className="relative group">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                    <i data-lucide="key-round" className="w-5 h-5"></i>
                                                </div>
                                                <input type="text" value={resetCode} onChange={e => setResetCode(e.target.value)} maxLength="6"
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-bold tracking-widest text-center" 
                                                    placeholder="000000" required />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Nova Senha</label>
                                            <div className="relative group">

                                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                                </div>
                                                <input type="password" value={authPass} onChange={e => setAuthPass(e.target.value)} 
                                                    className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium"

                                <div className="mt-8">
