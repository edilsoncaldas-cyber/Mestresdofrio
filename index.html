<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestres do Frio - Sistema de Pontuação</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ExcelJS para exportar .xlsx com listas suspensas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .bg-refrigeracao { background-color: #0ea5e9; } /* Azul Elgin */
        .bg-climatizacao { background-color: #f97316; } /* Laranja Quente */
        .text-refrigeracao { color: #0ea5e9; }
        .text-climatizacao { color: #f97316; }
        
        /* Oculta scrollbar para o placar de projeção */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Fundo animado para tela de login */
        .login-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- DADOS INICIAIS BASEADOS NO DOC ---
        const PROVAS = [
            { id: 1, nome: "Prova 1: Área de Lazer" },
            { id: 2, nome: "Prova 2: Buffet de Eventos" },
            { id: 3, nome: "Prova 3: Restaurante" },
            { id: 4, nome: "Prova 4: Supermercado" },
            { id: 5, nome: "Prova 5: CPD / Data Center" },
            { id: 6, nome: "Prova 6: Logística Industrial" },
            { id: 7, nome: "Prova 7: Semi-final" },
            { id: 8, nome: "Prova 8: Grande Final" }
        ];

        const CRITERIOS = [
            { id: 'c1', nome: "1. Procedimento técnico correto", max: 20 },
            { id: 'c2', nome: "2. Uso adequado de instrumentos", max: 20 },
            { id: 'c3', nome: "3. Diagnóstico assertivo", max: 20 },
            { id: 'c4', nome: "4. Correção da falha", max: 20 },
            { id: 'c5', nome: "5. Segurança e organização", max: 20 }
        ];

        // SUB-CRITÉRIOS BASEADOS NO MODELO DA PLANILHA (SIM/NÃO)
        const DEFAULT_SUBCRITERIOS = [
            // REFRIGERAÇÃO (R)
            { id: 'r_c1_1', mod: 'R', crit: 'c1', desc: 'Desligou equipamento antes do manuseio', pts: 5 },
            { id: 'r_c1_2', mod: 'R', crit: 'c1', desc: 'Recolheu gás conforme norma', pts: 15 },
            { id: 'r_c2_1', mod: 'R', crit: 'c2', desc: 'Uso correto do multímetro na resistência', pts: 10 },
            { id: 'r_c2_2', mod: 'R', crit: 'c2', desc: 'Conexão do manifold sem vazamentos', pts: 10 },
            { id: 'r_c3_1', mod: 'R', crit: 'c3', desc: 'Identificou resistência queimada rapidamente', pts: 10 },
            { id: 'r_c3_2', mod: 'R', crit: 'c3', desc: 'Diagnóstico elétrico preciso', pts: 10 },
            { id: 'r_c4_1', mod: 'R', crit: 'c4', desc: 'Substituiu peça adequadamente', pts: 10 },
            { id: 'r_c4_2', mod: 'R', crit: 'c4', desc: 'Realizou vácuo e carga de fluido corretos', pts: 10 },
            { id: 'r_c5_1', mod: 'R', crit: 'c5', desc: 'EPIs completos (Luva/Óculos)', pts: 10 },
            { id: 'r_c5_2', mod: 'R', crit: 'c5', desc: 'Deixou ambiente limpo após o serviço', pts: 10 },
            
            // CLIMATIZAÇÃO (C)
            { id: 'c_c1_1', mod: 'C', crit: 'c1', desc: 'Verificação do manual de instalação', pts: 5 },
            { id: 'c_c1_2', mod: 'C', crit: 'c1', desc: 'Adequação da tubulação e Infraestrutura', pts: 15 },
            { id: 'c_c2_1', mod: 'C', crit: 'c2', desc: 'Manuseio de flangeador e cortador', pts: 10 },
            { id: 'c_c2_2', mod: 'C', crit: 'c2', desc: 'Utilização de bomba de vácuo e vacuômetro', pts: 10 },
            { id: 'c_c3_1', mod: 'C', crit: 'c3', desc: 'Identificação de código de erro no display', pts: 10 },
            { id: 'c_c3_2', mod: 'C', crit: 'c3', desc: 'Teste de componentes elétricos/sensores', pts: 10 },
            { id: 'c_c4_1', mod: 'C', crit: 'c4', desc: 'Correção de vazamentos em flanges', pts: 10 },
            { id: 'c_c4_2', mod: 'C', crit: 'c4', desc: 'Reoperação e estabilização térmica', pts: 10 },
            { id: 'c_c5_1', mod: 'C', crit: 'c5', desc: 'EPIs completos (Luva/Cinto)', pts: 10 },
            { id: 'c_c5_2', mod: 'C', crit: 'c5', desc: 'Organização e segurança com ferramentas', pts: 10 }
        ];

        const PARTICIPANTES_INICIAIS = [
            { id: 'r1', nome: "Participante Ref 1", modalidade: "R" },
            { id: 'r2', nome: "Participante Ref 2", modalidade: "R" },
            { id: 'r3', nome: "Participante Ref 3", modalidade: "R" },
            { id: 'r4', nome: "Participante Ref 4", modalidade: "R" },
            { id: 'r5', nome: "Participante Ref 5", modalidade: "R" },
            { id: 'c1', nome: "Participante Cli 1", modalidade: "C" },
            { id: 'c2', nome: "Participante Cli 2", modalidade: "C" },
            { id: 'c3', nome: "Participante Cli 3", modalidade: "C" },
            { id: 'c4', nome: "Participante Cli 4", modalidade: "C" },
            { id: 'c5', nome: "Participante Cli 5", modalidade: "C" }
        ];

        // USUÁRIOS PADRÃO (Com Perfis e Modalidades Diferentes)
        const DEFAULT_USERS = [
            { user: 'admin', pass: '123', role: 'admin', modality: 'ALL' },
            { user: 'j1', pass: '123', role: 'j1', modality: 'R' },
            { user: 'j2', pass: '123', role: 'j2', modality: 'C' },
            { user: 'apresentador', pass: '123', role: 'apresentador', modality: 'ALL' }
        ];

        function App() {
            // --- RENDERIZAÇÃO DE ÍCONES DO LUCIDE ---
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // --- ESTADOS DE AUTENTICAÇÃO E PERFIL ---
            const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('mdf_current_user')) || null);
            const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem('mdf_users')) || DEFAULT_USERS);
            const [authMode, setAuthMode] = useState('login');
            const [authUser, setAuthUser] = useState('');
            const [authPass, setAuthPass] = useState('');
            const [authRole, setAuthRole] = useState('admin');
            const [authModality, setAuthModality] = useState('R'); // Nova opção de modalidade para jurados
            const [authError, setAuthError] = useState('');

            // --- ESTADOS DA APLICAÇÃO ---
            const [view, setView] = useState('tablet');
            const [participantes, setParticipantes] = useState(PARTICIPANTES_INICIAIS);
            const [notas, setNotas] = useState([]); // [{ id, participanteId, provaId, totalJ1, totalJ2, extra, duplaId }]
            const [logoUrl, setLogoUrl] = useState(() => localStorage.getItem('mdf_logo') || null);

            // Estado do Formulário de Lançamento (Tablet)
            const [formMod, setFormMod] = useState('R');
            const [formProva, setFormProva] = useState(1);
            const [formPart, setFormPart] = useState('r1');
            const [formDupla, setFormDupla] = useState('');
            
            const [avalJ1, setAvalJ1] = useState({});
            const [avalJ2, setAvalJ2] = useState({});
            const [notaExtra, setNotaExtra] = useState(0);

            // Ajusta View Inicial e trava a Modalidade baseada no Perfil
            useEffect(() => {
                if (currentUser) {
                    if (currentUser.role === 'apresentador') {
                        setView('placar');
                    } else if (currentUser.role === 'j1' || currentUser.role === 'j2') {
                        setView('tablet');
                        if (currentUser.modality && currentUser.modality !== 'ALL') {
                            setFormMod(currentUser.modality);
                        }
                    }
                }
            }, [currentUser]);

            // Trocar primeiro participante ao trocar modalidade e resetar avaliações
            useEffect(() => {
                const parts = participantes.filter(p => p.modalidade === formMod);
                if(parts.length > 0) {
                    // Apenas define o participante inicial se o atual não pertencer à nova modalidade
                    const currentPartBelongs = parts.find(p => p.id === formPart);
                    if (!currentPartBelongs) {
                        setFormPart(parts[0].id);
                    }
                    setFormDupla('');
                    setAvalJ1({});
                    setAvalJ2({});
                }
            }, [formMod, participantes]);

            // --- FUNÇÕES DE AUTENTICAÇÃO ---
            const handleLogin = (e) => {
                e.preventDefault();
                const found = users.find(u => u.user === authUser && u.pass === authPass);
                if(found) {
                    setCurrentUser(found);
                    localStorage.setItem('mdf_current_user', JSON.stringify(found));
                    setAuthError('');
                } else {
                    setAuthError('Usuário ou senha incorretos.');
                }
            };

            const handleRegister = (e) => {
                e.preventDefault();
                if(!authUser || !authPass) {
                    setAuthError('Preencha todos os campos.');
                    return;
                }
                if(users.find(u => u.user === authUser)) {
                    setAuthError('Este nome de usuário já existe.');
                    return;
                }
                
                const newUser = { 
                    user: authUser, 
                    pass: authPass, 
                    role: authRole,
                    modality: (authRole === 'j1' || authRole === 'j2') ? authModality : 'ALL' 
                };
                
                const newUsers = [...users, newUser];
                setUsers(newUsers);
                localStorage.setItem('mdf_users', JSON.stringify(newUsers));
                
                setCurrentUser(newUser);
                localStorage.setItem('mdf_current_user', JSON.stringify(newUser));
                setAuthError('');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('mdf_current_user');
                setAuthUser('');
                setAuthPass('');
                setView('tablet');
            };

            // --- FUNÇÕES DA APLICAÇÃO ---
            const handleSalvarNota = () => {
                const subAtivos = DEFAULT_SUBCRITERIOS.filter(s => s.mod === formMod);
                const totalJ1 = subAtivos.reduce((acc, sub) => acc + (avalJ1[sub.id] === true ? sub.pts : 0), 0);
                const totalJ2 = subAtivos.reduce((acc, sub) => acc + (avalJ2[sub.id] === true ? sub.pts : 0), 0);
                const extraPts = parseInt(notaExtra) || 0;
                const dupla = formDupla || null;

                setNotas(prev => {
                    const idBusca = `${formProva}_${formPart}`;
                    const index = prev.findIndex(n => n.id === idBusca);
                    
                    if (index >= 0) {
                        const updated = [...prev];
                        // Atualiza apenas a nota do jurado que está salvando
                        if (currentUser.role === 'j1') {
                            updated[index] = { ...updated[index], totalJ1 };
                        } else if (currentUser.role === 'j2') {
                            updated[index] = { ...updated[index], totalJ2 };
                        } else {
                            // Admin sobreescreve tudo, inclusive extra
                            updated[index] = { ...updated[index], totalJ1, totalJ2, extra: extraPts, duplaId: dupla };
                        }
                        return updated;
                    } else {
                        // Novo registro na prova
                        return [...prev, {
                            id: idBusca,
                            participanteId: formPart,
                            provaId: formProva,
                            totalJ1: currentUser.role === 'j2' ? 0 : totalJ1,
                            totalJ2: currentUser.role === 'j1' ? 0 : totalJ2,
                            extra: currentUser.role === 'admin' ? extraPts : 0,
                            duplaId: currentUser.role === 'admin' ? dupla : null
                        }];
                    }
                });

                alert("Avaliação salva com sucesso!");
                if (currentUser.role === 'j1') setAvalJ1({});
                if (currentUser.role === 'j2') setAvalJ2({});
                if (currentUser.role === 'admin') { setAvalJ1({}); setAvalJ2({}); setNotaExtra(0); setFormDupla(''); }
            };

            // Download automático da planilha (agora em XLSX com listas suspensas)
            const handleBaixarModeloExcel = async () => {
                if (!window.ExcelJS) {
                    alert("A biblioteca do Excel ainda está carregando. Tente novamente em instantes.");
                    return;
                }

                const workbook = new window.ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('Subcritérios');

                // Cabeçalhos
                worksheet.columns = [
                    { header: 'Ar condicionado ou Refrigeração', key: 'mod', width: 35 },
                    { header: 'Prova', key: 'prova', width: 15 },
                    { header: 'Critério', key: 'crit', width: 40 },
                    { header: 'Subcritério', key: 'sub', width: 50 },
                    { header: 'Pontuação por subcritério', key: 'pts', width: 25 }
                ];

                // Estiliza o cabeçalho
                worksheet.getRow(1).font = { bold: true, color: { argb: 'FFFFFFFF' } };
                worksheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F172A' } };

                // Dados de exemplo
                worksheet.addRow(["Refrigeração", "P1", "1. Procedimento técnico correto", "Desligou equipamento antes do manuseio", 5]);
                worksheet.addRow(["Refrigeração", "P1", "1. Procedimento técnico correto", "Recolheu gás conforme norma", 15]);
                worksheet.addRow(["Ar condicionado", "P1", "1. Procedimento técnico correto", "Verificação do manual de instalação", 10]);
                worksheet.addRow(["Ar condicionado", "P1", "1. Procedimento técnico correto", "Adequação da tubulação", 10]);

                // Aplica Lista Suspensa (Data Validation) até a linha 100
                for (let i = 2; i <= 100; i++) {
                    worksheet.getCell(`A${i}`).dataValidation = {
                        type: 'list',
                        allowBlank: true,
                        formulae: ['"Ar condicionado,Refrigeração"']
                    };
                    
                    worksheet.getCell(`B${i}`).dataValidation = {
                        type: 'list',
                        allowBlank: true,
                        formulae: ['"P1,P2,P3,P4,P5,P6,P7,P8"']
                    };
                    
                    worksheet.getCell(`C${i}`).dataValidation = {
                        type: 'list',
                        allowBlank: true,
                        formulae: ['"1. Procedimento técnico correto,2. Uso adequado de instrumentos,3. Diagnóstico assertivo,4. Correção da falha,5. Segurança e organização"']
                    };
                }

                // Gera o arquivo Excel e faz o download
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "Modelo_Subcriterios.xlsx";
                link.click();
                window.URL.revokeObjectURL(url);
            };

            // Cálculo do Placar Atualizado: Somatório Simples
            const placarCalculado = useMemo(() => {
                let placar = participantes.map(p => ({ ...p, total: 0 }));
                
                notas.forEach(n => {
                    const totalCriterios = n.totalJ1 + n.totalJ2;
                    const pontosExtra = parseInt(n.extra) || 0;

                    const partIndex = placar.findIndex(p => p.id === n.participanteId);
                    if(partIndex > -1) {
                        placar[partIndex].total += totalCriterios + pontosExtra;
                    }

                    if(n.duplaId) {
                        const duplaIndex = placar.findIndex(p => p.id === n.duplaId);
                        if(duplaIndex > -1) {
                            placar[duplaIndex].total += pontosExtra;
                        }
                    }
                });

                return {
                    R: placar.filter(p => p.modalidade === 'R').sort((a,b) => b.total - a.total),
                    C: placar.filter(p => p.modalidade === 'C').sort((a,b) => b.total - a.total)
                };
            }, [participantes, notas]);

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Erro ao tentar tela cheia: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLogoUrl(reader.result);
                        localStorage.setItem('mdf_logo', reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const removerLogo = () => {
                setLogoUrl(null);
                localStorage.removeItem('mdf_logo');
            };

            // ==========================================
            // RENDER: TELA DE LOGIN / CADASTRO
            // ==========================================
            if (!currentUser) {
                return (
                    <div className="min-h-screen flex text-gray-900 bg-white font-sans">
                        <div className="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-gradient-to-br from-slate-900 via-blue-900 to-cyan-700 justify-center items-center p-12 text-center shadow-2xl z-10">
                            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-white opacity-5 rounded-full blur-3xl pointer-events-none"></div>
                            <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-400 opacity-10 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <div className="relative z-10 flex flex-col items-center">
                                {logoUrl ? (
                                    <img src={logoUrl} alt="Mestres do Frio" className="max-h-56 object-contain mb-8 drop-shadow-2xl transition-transform hover:scale-105 duration-500" />
                                ) : (
                                    <div className="mb-8 p-6 bg-white/10 backdrop-blur-sm rounded-3xl border border-white/20 shadow-2xl">
                                        <h1 className="text-6xl font-black text-white uppercase tracking-widest drop-shadow-lg">
                                            Mestres<br/><span className="text-cyan-400">do Frio</span>
                                        </h1>
                                    </div>
                                )}
                                <p className="text-blue-100 text-xl font-medium max-w-md drop-shadow">
                                    Sistema Oficial de Pontuação, Gestão de Provas e Projeção de Placar.
                                </p>
                            </div>
                        </div>

                        <div className="w-full lg:w-1/2 flex flex-col justify-center p-8 sm:p-16 xl:p-24 bg-gray-50 relative">
                            <div className="lg:hidden text-center mb-10">
                                {logoUrl ? (
                                    <img src={logoUrl} alt="Mestres do Frio" className="max-h-28 mx-auto object-contain mb-4 drop-shadow-md" />
                                ) : (
                                    <h1 className="text-4xl font-black text-slate-900 uppercase tracking-widest mb-2">
                                        Mestres<br/><span className="text-blue-600">do Frio</span>
                                    </h1>
                                )}
                            </div>

                            <div className="max-w-md w-full mx-auto">
                                <div className="mb-10 text-center lg:text-left">
                                    <h2 className="text-3xl font-extrabold text-gray-900 mb-3">
                                        {authMode === 'login' ? 'Bem-vindo de volta!' : 'Crie sua conta'}
                                    </h2>
                                    <p className="text-gray-500 font-medium text-sm">
                                        {authMode === 'login' ? 'Insira suas credenciais para acessar seu painel.' : 'Defina seus dados e seu perfil de acesso.'}
                                    </p>
                                </div>

                                {authError && (
                                    <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 flex items-center text-red-700 text-sm font-medium rounded-r-md animate-pulse">
                                        <i data-lucide="alert-circle" className="w-5 h-5 mr-3 flex-shrink-0"></i>
                                        {authError}
                                    </div>
                                )}

                                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Nome de Usuário</label>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                <i data-lucide="user" className="w-5 h-5"></i>
                                            </div>
                                            <input type="text" value={authUser} onChange={e => setAuthUser(e.target.value)} 
                                                className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                placeholder="ex: admin" required />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Senha de Acesso</label>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                <i data-lucide="lock" className="w-5 h-5"></i>
                                            </div>
                                            <input type="password" value={authPass} onChange={e => setAuthPass(e.target.value)} 
                                                className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium" 
                                                placeholder="ex: 123" required />
                                        </div>
                                    </div>

                                    {authMode === 'register' && (
                                        <>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">Perfil de Acesso</label>
                                                <div className="relative group">
                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                        <i data-lucide="shield" className="w-5 h-5"></i>
                                                    </div>
                                                    <select value={authRole} onChange={e => setAuthRole(e.target.value)} 
                                                        className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium appearance-none cursor-pointer">
                                                        <option value="admin">Administrador (Total)</option>
                                                        <option value="j1">Jurado Elgin (J1)</option>
                                                        <option value="j2">Jurado Técnico SENAI (J2)</option>
                                                        <option value="apresentador">Apresentador (Placar)</option>
                                                    </select>
                                                </div>
                                            </div>

                                            {(authRole === 'j1' || authRole === 'j2') && (
                                                <div className="animate-fade-in">
                                                    <label className="block text-sm font-bold text-gray-700 mb-2">Especialidade (Modalidade)</label>
                                                    <div className="relative group">
                                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                                            <i data-lucide="wrench" className="w-5 h-5"></i>
                                                        </div>
                                                        <select value={authModality} onChange={e => setAuthModality(e.target.value)} 
                                                            className="w-full pl-12 p-4 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-gray-800 font-medium appearance-none cursor-pointer">
                                                            <option value="R">Refrigeração</option>
                                                            <option value="C">Ar Condicionado (Climatização)</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            )}
                                        </>
                                    )}

                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all transform active:scale-95 flex justify-center items-center text-lg mt-4">
                                        {authMode === 'login' ? (
                                            <><i data-lucide="log-in" className="w-5 h-5 mr-2"></i> Entrar no Sistema</>
                                        ) : (
                                            <><i data-lucide="user-plus" className="w-5 h-5 mr-2"></i> Cadastrar Usuário</>
                                        )}
                                    </button>
                                </form>

                                <div className="mt-8">
                                    <div className="relative">
                                        <div className="absolute inset-0 flex items-center">
                                            <div className="w-full border-t border-gray-200"></div>
                                        </div>
                                        <div className="relative flex justify-center text-sm">
                                            <span className="px-4 bg-gray-50 text-gray-400 font-medium">Controle de Produção</span>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6">
                                        {authMode === 'login' ? (
                                            <button onClick={() => {setAuthMode('register'); setAuthError('');}} className="w-full flex justify-center py-4 px-4 border-2 border-gray-200 rounded-xl shadow-sm text-sm font-bold text-gray-600 bg-white hover:bg-gray-50 hover:border-gray-300 transition-colors">
                                                Criar uma nova conta
                                            </button>
                                        ) : (
                                            <button onClick={() => {setAuthMode('login'); setAuthError('');}} className="w-full flex justify-center py-4 px-4 border-2 border-gray-200 rounded-xl shadow-sm text-sm font-bold text-gray-600 bg-white hover:bg-gray-50 hover:border-gray-300 transition-colors">
                                                Voltar para a tela de Login
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // RENDER: APRESENTADOR (SÓ VÊ O PLACAR) OU TELA CHEIA DO PLACAR
            // ==========================================
            if (currentUser.role === 'apresentador' || view === 'placar') {
                return (
                    <div className="bg-gray-900 min-h-screen text-white p-8 flex flex-col">
                        <div className="flex justify-between items-center mb-10">
                            {logoUrl ? (
                                <img src={logoUrl} alt="Mestres do Frio" className="max-h-24 object-contain" />
                            ) : (
                                <h1 className="text-5xl font-black tracking-widest uppercase">Mestres do <span className="text-blue-400">Frio</span></h1>
                            )}
                            <div className="flex gap-4">
                                <button onClick={toggleFullScreen} className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-bold shadow flex items-center">
                                    <i data-lucide="maximize" className="w-4 h-4 mr-2"></i>TELA CHEIA
                                </button>
                                {currentUser.role === 'apresentador' ? (
                                    <button onClick={handleLogout} className="bg-red-600 hover:bg-red-500 px-4 py-2 rounded text-sm font-bold shadow flex items-center">
                                        <i data-lucide="log-out" className="w-4 h-4 mr-2"></i>SAIR DO SISTEMA
                                    </button>
                                ) : (
                                    <button onClick={() => setView('tablet')} className="bg-red-600 hover:bg-red-500 px-4 py-2 rounded text-sm font-bold shadow flex items-center">
                                        <i data-lucide="x" className="w-4 h-4 mr-2"></i>FECHAR PLACAR
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 grid grid-cols-2 gap-12">
                            <div className="bg-gray-800 rounded-xl p-8 border-t-8 border-blue-500 shadow-2xl">
                                <h2 className="text-4xl font-bold mb-8 text-center text-blue-400 uppercase tracking-widest drop-shadow-md">Refrigeração</h2>
                                <div className="space-y-4">
                                    {placarCalculado.R.map((p, index) => (
                                        <div key={p.id} className="flex items-center bg-gray-700 rounded-lg p-4 transition-transform transform hover:scale-105 shadow-md">
                                            <div className="w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center text-2xl font-bold mr-6 shadow-inner text-white">
                                                {index + 1}
                                            </div>
                                            <div className="flex-1 text-3xl font-semibold text-gray-100">{p.nome}</div>
                                            <div className="text-4xl font-black text-blue-300">{p.total} <span className="text-lg text-gray-400 font-normal">pts</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-gray-800 rounded-xl p-8 border-t-8 border-orange-500 shadow-2xl">
                                <h2 className="text-4xl font-bold mb-8 text-center text-orange-400 uppercase tracking-widest drop-shadow-md">Climatização</h2>
                                <div className="space-y-4">
                                    {placarCalculado.C.map((p, index) => (
                                        <div key={p.id} className="flex items-center bg-gray-700 rounded-lg p-4 transition-transform transform hover:scale-105 shadow-md">
                                            <div className="w-12 h-12 rounded-full bg-orange-500 flex items-center justify-center text-2xl font-bold mr-6 shadow-inner text-white">
                                                {index + 1}
                                            </div>
                                            <div className="flex-1 text-3xl font-semibold text-gray-100">{p.nome}</div>
                                            <div className="text-4xl font-black text-orange-300">{p.total} <span className="text-lg text-gray-400 font-normal">pts</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // RENDER: ADMIN E JURADOS (MENU + PAINEL)
            // ==========================================
            const isAdmin = currentUser.role === 'admin';
            const isJ1 = currentUser.role === 'j1' || isAdmin;
            const isJ2 = currentUser.role === 'j2' || isAdmin;

            // Define o texto do selo (Badge) do menu
            const getRoleLabel = () => {
                if (currentUser.role === 'admin') return "Administrador";
                const modalidade = currentUser.modality === 'R' ? '(Refrigeração)' : currentUser.modality === 'C' ? '(Climatização)' : '';
                if (currentUser.role === 'j1') return `Jurado Elgin ${modalidade}`;
                if (currentUser.role === 'j2') return `Jurado SENAI ${modalidade}`;
                return "";
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Menu Lateral */}
                    <nav className="bg-slate-900 w-full md:w-64 text-white p-6 flex flex-col shadow-xl">
                        <div className="mb-8 text-center flex flex-col items-center">
                            {logoUrl ? (
                                <img src={logoUrl} alt="Mestres do Frio" className="max-h-24 mb-3 object-contain" />
                            ) : (
                                <h2 className="text-2xl font-black uppercase tracking-wider">Mestres<br/><span className="text-blue-400">do Frio</span></h2>
                            )}
                            <div className="mt-3 bg-blue-600 text-[10px] font-bold px-3 py-1 rounded-full text-white uppercase tracking-wider text-center leading-tight">
                                {getRoleLabel()}
                            </div>
                        </div>
                        
                        <div className="flex-1 space-y-4">
                            <button onClick={() => setView('tablet')} className={`w-full flex items-center p-3 rounded-lg font-medium transition ${view === 'tablet' ? 'bg-blue-500 shadow' : 'hover:bg-slate-800'}`}>
                                <i data-lucide="tablet" className="w-5 h-5 mr-3"></i> Lançamento
                            </button>
                            
                            {isAdmin && (
                                <>
                                    <button onClick={() => setView('config')} className={`w-full flex items-center p-3 rounded-lg font-medium transition ${view === 'config' ? 'bg-blue-500 shadow' : 'hover:bg-slate-800'}`}>
                                        <i data-lucide="users" className="w-5 h-5 mr-3"></i> Configurações
                                    </button>
                                    <button onClick={() => setView('placar')} className={`w-full flex items-center p-3 rounded-lg font-medium transition border border-gray-600 hover:bg-green-600 hover:border-green-600`}>
                                        <i data-lucide="monitor-play" className="w-5 h-5 mr-3"></i> Projetar Placar
                                    </button>
                                </>
                            )}
                        </div>
                        
                        <div className="mt-auto pt-6 border-t border-slate-700">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center p-3 rounded-lg font-medium text-red-400 hover:bg-red-500 hover:text-white transition">
                                <i data-lucide="log-out" className="w-5 h-5 mr-2"></i> Sair do Sistema
                            </button>
                        </div>
                    </nav>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                        
                        {/* TELA DE LANÇAMENTO (TABLET) */}
                        {view === 'tablet' && (
                            <div className="max-w-6xl mx-auto">
                                <header className="mb-8">
                                    <h1 className="text-3xl font-bold text-gray-800">Lançamento de Notas (Checklist)</h1>
                                    <p className="text-gray-500">Marque SIM ou NÃO para cada subcritério. A pontuação será somada automaticamente.</p>
                                </header>

                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 border-b pb-8">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Modalidade</label>
                                            <select 
                                                value={formMod} 
                                                onChange={e => setFormMod(e.target.value)} 
                                                disabled={currentUser.role !== 'admin' && currentUser.modality !== 'ALL'}
                                                className={`w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-lg cursor-pointer ${currentUser.role !== 'admin' && currentUser.modality !== 'ALL' ? 'bg-gray-200 text-gray-500' : 'bg-gray-50'}`}
                                            >
                                                <option value="R">Refrigeração</option>
                                                <option value="C">Climatização</option>
                                            </select>
                                            {currentUser.role !== 'admin' && currentUser.modality !== 'ALL' && (
                                                <p className="text-xs text-orange-500 mt-1 font-bold">Travado na sua especialidade.</p>
                                            )}
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Prova</label>
                                            <select value={formProva} onChange={e => setFormProva(Number(e.target.value))} className="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none text-lg cursor-pointer">
                                                {PROVAS.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Participante Avaliado</label>
                                            <select value={formPart} onChange={e => setFormPart(e.target.value)} className="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none text-lg cursor-pointer">
                                                {participantes.filter(p => p.modalidade === formMod).map(p => (
                                                    <option key={p.id} value={p.id}>{p.nome}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Grid de Jurados - Renderiza de acordo com o perfil */}
                                    <div className={`grid grid-cols-1 ${isAdmin ? 'xl:grid-cols-2' : ''} gap-8`}>
                                        
                                        {/* Jurado 1 (Elgin) - Visível para admin e J1 */}
                                        {isJ1 && (
                                            <div className="bg-blue-50 p-5 rounded-xl border border-blue-200 shadow-sm">
                                                <h3 className="text-xl font-bold text-blue-900 mb-6 flex items-center border-b border-blue-200 pb-4">
                                                    <span className="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center mr-3 text-sm shadow">J1</span>
                                                    Jurado Elgin
                                                </h3>
                                                <div className="space-y-6">
                                                    {CRITERIOS.map(c => {
                                                        const subs = DEFAULT_SUBCRITERIOS.filter(s => s.mod === formMod && s.crit === c.id);
                                                        const totalCrit = subs.reduce((acc, s) => acc + (avalJ1[s.id] === true ? s.pts : 0), 0);
                                                        if(subs.length === 0) return null;
                                                        
                                                        return (
                                                            <div key={`j1_${c.id}`} className="bg-white p-4 rounded-lg shadow-sm border border-blue-100">
                                                                <div className="flex justify-between items-center mb-3">
                                                                    <h4 className="font-bold text-gray-800 text-sm uppercase tracking-wide">{c.nome}</h4>
                                                                    <span className="bg-blue-100 text-blue-800 font-black px-3 py-1 rounded-full text-sm">
                                                                        {totalCrit} / {c.max} pts
                                                                    </span>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    {subs.map(sub => (
                                                                        <div key={`j1_sub_${sub.id}`} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-50 p-3 rounded border border-gray-100">
                                                                            <span className="text-sm text-gray-700 flex-1 font-medium mb-2 sm:mb-0 mr-4">
                                                                                {sub.desc} <span className="text-xs text-gray-400 block sm:inline">({sub.pts} pts)</span>
                                                                            </span>
                                                                            <div className="flex space-x-2 shrink-0">
                                                                                <button 
                                                                                    onClick={() => setAvalJ1(prev => ({...prev, [sub.id]: true}))}
                                                                                    className={`px-4 py-2 rounded text-xs font-bold transition shadow-sm border ${avalJ1[sub.id] === true ? 'bg-green-500 text-white border-green-600' : 'bg-white text-gray-500 hover:bg-green-50 border-gray-200'}`}
                                                                                >SIM</button>
                                                                                <button 
                                                                                    onClick={() => setAvalJ1(prev => ({...prev, [sub.id]: false}))}
                                                                                    className={`px-4 py-2 rounded text-xs font-bold transition shadow-sm border ${avalJ1[sub.id] === false ? 'bg-red-500 text-white border-red-600' : 'bg-white text-gray-500 hover:bg-red-50 border-gray-200'}`}
                                                                                >NÃO</button>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {/* Jurado 2 (SENAI) - Visível para admin e J2 */}
                                        {isJ2 && (
                                            <div className="bg-green-50 p-5 rounded-xl border border-green-200 shadow-sm">
                                                <h3 className="text-xl font-bold text-green-900 mb-6 flex items-center border-b border-green-200 pb-4">
                                                    <span className="w-10 h-10 rounded-full bg-green-600 text-white flex items-center justify-center mr-3 text-sm shadow">J2</span>
                                                    Jurado Técnico (SENAI)
                                                </h3>
                                                <div className="space-y-6">
                                                    {CRITERIOS.map(c => {
                                                        const subs = DEFAULT_SUBCRITERIOS.filter(s => s.mod === formMod && s.crit === c.id);
                                                        const totalCrit = subs.reduce((acc, s) => acc + (avalJ2[s.id] === true ? s.pts : 0), 0);
                                                        if(subs.length === 0) return null;

                                                        return (
                                                            <div key={`j2_${c.id}`} className="bg-white p-4 rounded-lg shadow-sm border border-green-100">
                                                                <div className="flex justify-between items-center mb-3">
                                                                    <h4 className="font-bold text-gray-800 text-sm uppercase tracking-wide">{c.nome}</h4>
                                                                    <span className="bg-green-100 text-green-800 font-black px-3 py-1 rounded-full text-sm">
                                                                        {totalCrit} / {c.max} pts
                                                                    </span>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    {subs.map(sub => (
                                                                        <div key={`j2_sub_${sub.id}`} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-50 p-3 rounded border border-gray-100">
                                                                            <span className="text-sm text-gray-700 flex-1 font-medium mb-2 sm:mb-0 mr-4">
                                                                                {sub.desc} <span className="text-xs text-gray-400 block sm:inline">({sub.pts} pts)</span>
                                                                            </span>
                                                                            <div className="flex space-x-2 shrink-0">
                                                                                <button 
                                                                                    onClick={() => setAvalJ2(prev => ({...prev, [sub.id]: true}))}
                                                                                    className={`px-4 py-2 rounded text-xs font-bold transition shadow-sm border ${avalJ2[sub.id] === true ? 'bg-green-500 text-white border-green-600' : 'bg-white text-gray-500 hover:bg-green-50 border-gray-200'}`}
                                                                                >SIM</button>
                                                                                <button 
                                                                                    onClick={() => setAvalJ2(prev => ({...prev, [sub.id]: false}))}
                                                                                    className={`px-4 py-2 rounded text-xs font-bold transition shadow-sm border ${avalJ2[sub.id] === false ? 'bg-red-500 text-white border-red-600' : 'bg-white text-gray-500 hover:bg-red-50 border-gray-200'}`}
                                                                                >NÃO</button>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Pontos Extras (SOMENTE ADMIN) */}
                                    {isAdmin && (
                                        <div className="mt-8 bg-yellow-50 p-6 rounded-xl border border-yellow-200 shadow-sm">
                                            <h3 className="text-xl font-bold text-yellow-800 mb-4 flex items-center">
                                                <i data-lucide="star" className="w-6 h-6 mr-2"></i>
                                                Pontuação Extra (Dinâmica em Dupla)
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                                                <div>
                                                    <label className="block text-sm font-bold text-yellow-900 mb-2">Parceiro de Dupla (Compartilhará os Pontos Extras)</label>
                                                    <select value={formDupla} onChange={e => setFormDupla(e.target.value)} className="w-full p-3 border border-yellow-300 rounded-lg bg-white focus:ring-2 focus:ring-yellow-500 outline-none cursor-pointer">
                                                        <option value="">Nenhum (Somente Individual)</option>
                                                        {participantes
                                                            .filter(p => p.modalidade === formMod && p.id !== formPart)
                                                            .map(p => (
                                                                <option key={p.id} value={p.id}>{p.nome}</option>
                                                        ))}
                                                    </select>
                                                    <p className="text-xs text-yellow-700 mt-2">Apenas o administrador gerencia bônus de equipe.</p>
                                                </div>
                                                <div className="flex flex-col items-start md:items-end">
                                                    <label className="block text-sm font-bold text-yellow-900 mb-2">Valor do Ponto Extra</label>
                                                    <input type="number" value={notaExtra} onChange={e => setNotaExtra(e.target.value)}
                                                        className="w-32 p-3 border-2 border-yellow-400 rounded-lg text-center font-bold text-3xl focus:ring-2 focus:ring-yellow-500 bg-white outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-8 pt-6 border-t border-gray-200">
                                        <button onClick={handleSalvarNota} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 px-6 rounded-xl text-xl shadow-lg transition transform active:scale-95 flex justify-center items-center">
                                            <i data-lucide="check-circle" className="w-7 h-7 mr-3"></i>
                                            SALVAR NOTAS (PROVA {formProva})
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TELA DE CONFIGURAÇÕES (SÓ ADMIN) */}
                        {view === 'config' && isAdmin && (
                            <div className="max-w-4xl mx-auto">
                                <header className="mb-8">
                                    <h1 className="text-3xl font-bold text-gray-800">Configurações & Participantes</h1>
                                </header>

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Identidade Visual (Logo)</h2>
                                    <p className="text-gray-600 mb-4 text-sm">Faça o upload do logo do reality para exibi-lo no placar e no menu.</p>
                                    <div className="flex items-center gap-4">
                                        {logoUrl ? (
                                            <div className="flex items-center gap-4 bg-gray-50 p-4 rounded-lg border w-full justify-between">
                                                <img src={logoUrl} alt="Logo" className="h-16 object-contain bg-slate-900 p-2 rounded shadow" />
                                                <button onClick={removerLogo} className="text-red-500 hover:text-red-700 text-sm font-bold flex items-center bg-red-50 px-3 py-2 rounded">
                                                    <i data-lucide="trash-2" className="w-4 h-4 mr-1"></i> Remover Logo
                                                </button>
                                            </div>
                                        ) : (
                                            <input type="file" accept="image/*" onChange={handleLogoUpload} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border rounded-lg p-2" />
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                        <h2 className="text-xl font-bold text-blue-600 mb-4 border-b pb-2 flex items-center">
                                            <div className="w-3 h-3 rounded-full bg-blue-500 mr-2"></div> Elenco Refrigeração
                                        </h2>
                                        {participantes.filter(p => p.modalidade === 'R').map((p, i) => (
                                            <input key={p.id} type="text" value={p.nome} 
                                                onChange={e => {
                                                    const novos = [...participantes];
                                                    const index = novos.findIndex(x => x.id === p.id);
                                                    novos[index].nome = e.target.value;
                                                    setParticipantes(novos);
                                                }}
                                                className="w-full mb-3 p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none bg-gray-50" placeholder={`Nome Participante ${i+1}`} />
                                        ))}
                                    </div>
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                        <h2 className="text-xl font-bold text-orange-600 mb-4 border-b pb-2 flex items-center">
                                            <div className="w-3 h-3 rounded-full bg-orange-500 mr-2"></div> Elenco Climatização
                                        </h2>
                                        {participantes.filter(p => p.modalidade === 'C').map((p, i) => (
                                            <input key={p.id} type="text" value={p.nome} 
                                                onChange={e => {
                                                    const novos = [...participantes];
                                                    const index = novos.findIndex(x => x.id === p.id);
                                                    novos[index].nome = e.target.value;
                                                    setParticipantes(novos);
                                                }}
                                                className="w-full mb-3 p-2 border rounded focus:ring-2 focus:ring-orange-400 outline-none bg-gray-50" placeholder={`Nome Participante ${i+1}`} />
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Importação de Subcritérios (Excel/CSV)</h2>
                                    <p className="text-gray-600 mb-4 text-sm">
                                        Para desdobrar os critérios principais em subcritérios detalhados, preencha a planilha modelo e faça o upload para a produção. 
                                        <br/><strong className="text-red-500">Atenção: A soma das pontuações dos subcritérios não pode ultrapassar 20 pontos por critério.</strong>
                                    </p>
                                    
                                    <div className="p-4 bg-gray-50 border rounded-lg flex flex-col sm:flex-row items-center justify-between gap-4">
                                        <div className="flex items-center w-full">
                                            <div className="w-12 h-12 bg-green-100 text-green-600 rounded flex items-center justify-center mr-4 shadow-sm">
                                                <i data-lucide="file-spreadsheet"></i>
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-gray-800">Modelo_Subcriterios.xlsx</h4>
                                                <p className="text-xs text-gray-500">Planilha inteligente com listas suspensas.</p>
                                            </div>
                                        </div>
                                        <button onClick={handleBaixarModeloExcel} className="w-full sm:w-auto whitespace-nowrap bg-slate-800 hover:bg-slate-700 text-white px-4 py-3 rounded-lg text-sm font-medium flex items-center justify-center shadow transition">
                                            <i data-lucide="download" className="w-4 h-4 mr-2"></i> Baixar Modelo
                                        </button>
                                    </div>
                                    <div className="mt-6 pt-6 border-t border-gray-100">
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Fazer upload de subcritérios preenchidos</label>
                                        <input type="file" accept=".csv, .xlsx" className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border p-2 rounded-lg" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
